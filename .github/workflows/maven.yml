name: Java CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/setup-java@v3
      with:
        java-version: '26'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Build and Test with Maven
      run: mvn package
